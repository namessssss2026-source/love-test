<!DOCTYPE html>
<html lang="zh-CN">

            --bg-color: #faf8f5;
            --text-main: #3d3b38;
            --accent-blue: #7da2a9;
            --danger-red: #d9534f;
        }
        body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.7; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        h1 { text-align: center; color: #2c2a29; font-size: 22px; font-weight: 600; margin-bottom: 10px; }
        .subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 25px; letter-spacing: 1px; }
        
        /* 锁屏界面样式 (VIP门禁) */
        #auth-screen { text-align: center; padding: 30px 15px; }
        .auth-icon { font-size: 48px; margin-bottom: 15px; }
        .auth-desc { font-size: 14px; color: #666; margin-bottom: 30px; background: #fdfbf7; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary-color); text-align: left;}
        #unlockCode { width: 100%; box-sizing: border-box; padding: 15px; font-size: 16px; text-align: center; border: 2px solid #eaddcf; border-radius: 8px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; background: #faf8f5; outline: none; transition: 0.3s;}
        #unlockCode:focus { border-color: var(--primary-color); background: #fff; }
        
        /* 按钮通用 */
        button { display: block; width: 100%; padding: 16px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 12px rgba(212, 163, 115, 0.4); }
        button:hover { background: #bc8a59; transform: translateY(-1px); }
        button:active { transform: translateY(1px); box-shadow: none; }

        .dimension-title::before { content: "✦"; margin-right: 8px; }
