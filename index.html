        <p><strong>【答题指引】：</strong>请仔细回忆你们相处中的具体细节，选择最符合对方真实日常表现的选项，而不是TA“承诺”或“偶尔”的样子。</p>
        <p><em>注：本量表共25题，全方位评估生存基石、情感供给、情绪底盘、成长联盟与底线品性。</em></p>
    </div>

    <form id="quizForm">

    const container = document.getElementById('questions-container');
    questions.forEach((item, index) => {
        let html = '';
        if (item.dim) {
            html += `<div class="dimension-title">${item.dim}</div>`;
        }
        html += `<div class="question"><p>${item.q}</p><div class="options">`;
        item.options.forEach((opt, optIndex) => {
            html += `<label><input type="radio" name="q${index+1}" value="${opt.score}"> ${opt.text}</label>`;
        });
        html += `</div></div>`;
        container.innerHTML += html;
    });

    function calculateScore() {
        let totalScore = 0;
        let veto = false;
        let answeredCount = 0;

        for (let i = 1; i <= 25; i++) {
            const radios = document.getElementsByName('q' + i);
            let answered = false;
            for (let radio of radios) {
                if (radio.checked) {
                    let score = parseInt(radio.value);
                    totalScore += score;
                    answered = true;
                    // 一票否决逻辑：第21-25题选了D（1分）
                    if (i >= 21 && i <= 25 && score === 1) {
                        veto = true;
                    }
                    break;
                }
            }
            if (answered) answeredCount++;
        }

        if (answeredCount < 25) {
            alert("请回答完所有25道问题后再提交哦！");
            return;
        }

        document.getElementById('quizForm').style.display = 'none';
        const resultBox = document.getElementById('result-box');
        const scoreValue = document.getElementById('scoreValue');
        const resultTitle = document.getElementById('resultTitle');
        const resultText = document.getElementById('resultText');
        
        resultBox.style.display = 'block';
